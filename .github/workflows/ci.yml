name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: aicord
          POSTGRES_PASSWORD: aicord
          POSTGRES_DB: aicord_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @aicord/shared build

      - name: Typecheck all packages
        run: pnpm -r typecheck

      - name: Run migrations
        run: pnpm --filter api db:migrate
        env:
          DATABASE_URL: postgresql://aicord:aicord@localhost:5432/aicord_test

      - name: Build all packages
        run: pnpm -r build
        env:
          DATABASE_URL: postgresql://aicord:aicord@localhost:5432/aicord_test
          JWT_SECRET: ci-secret-for-testing-only
          JWT_REFRESH_SECRET: ci-refresh-secret-for-testing-only
          REDIS_URL: redis://localhost:6379
